name: flutter_confetti_engine
description: >
  A celebration package that unifies confetti particles, haptic feedback, and
  optional sound in a single API call.
version: 1.0.4

# Repository is the canonical homepage until the package is listed on pub.dev.
homepage: https://github.com/iuzairaslam/flutter_confetti_engine

repository: https://github.com/iuzairaslam/flutter_confetti_engine
issue_tracker: https://github.com/iuzairaslam/flutter_confetti_engine/issues

# API docs: omit `documentation:` here — pub.dev hosts generated docs at
# https://pub.dev/documentation/flutter_confetti_engine/latest/ automatically.
# Setting it explicitly can fail package score checks until that URL exists.

topics:
  - animation
  - effects
  - celebration

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/sounds/
