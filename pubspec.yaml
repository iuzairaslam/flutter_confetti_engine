name: flutter_confetti_engine
description: >
  A celebration package that unifies confetti particles, haptic feedback, and
  optional sound in a single API call.
version: 1.0.0

# Primary landing for package consumers (live after first pub.dev publish).
homepage: https://pub.dev/packages/flutter_confetti_engine

# Replace `your-org` with your GitHub org or username before tagging releases.
repository: https://github.com/your-org/flutter_confetti_engine
issue_tracker: https://github.com/your-org/flutter_confetti_engine/issues

# API reference (populated by pub.dev after publish).
documentation: https://pub.dev/documentation/flutter_confetti_engine/latest/

topics:
  - animation
  - effects
  - celebration

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  audioplayers: ^6.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  assets:
    - assets/sounds/
