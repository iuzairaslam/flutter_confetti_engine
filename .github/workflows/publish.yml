# Trusted publishing (OIDC): https://dart.dev/tools/pub/automated-publishing
# pub.dev Admin → tag pattern `v{{version}}` must align with `on.push.tags` below.

name: Publish to pub.dev

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

jobs:
  publish:
    permissions:
      id-token: write # Required for authentication using OIDC
    uses: dart-lang/setup-dart/.github/workflows/publish.yml@v1
    # with:
    #   working-directory: path/to/package/within/repository
