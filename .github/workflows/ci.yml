name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  package:
    name: Package — format, analyze, test, publish dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format (dart format)
        run: dart format --output=none --set-exit-if-changed lib test

      - name: flutter pub get
        run: flutter pub get

      - name: flutter analyze
        run: flutter analyze

      - name: flutter test
        run: flutter test

      - name: dart pub publish --dry-run
        run: dart pub publish --dry-run

  example:
    name: Example — format, analyze, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Format example
        working-directory: example
        run: dart format --output=none --set-exit-if-changed lib test

      - name: flutter pub get
        working-directory: example
        run: flutter pub get

      - name: flutter analyze
        working-directory: example
        run: flutter analyze

      - name: flutter test
        working-directory: example
        run: flutter test
